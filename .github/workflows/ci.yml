name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - "22"
          - "24"
          - "26"

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/setup@v1
        with:
          runtime: "node@${{ matrix.node-version }}"
          cache: true
      - name: Build
        run: pnpm run -w build
      - name: Test
        run: pnpm run -w test
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  code-style:
    name: Check code style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/setup@v1
        with:
          cache: true
      - name: Check formatting
        run: pnpm run -w format-check
      - name: Lint
        run: pnpm run -w lint

  spell-checker:
    name: Check spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: streetsidesoftware/cspell-action@v8
