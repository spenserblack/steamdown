name: Bug report
description: File a bug report.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before you submit, please note that a failure to render some Markdown syntax is
        *not always a bug.* Steamdown intentionally diverges from common Markdown
        syntaxes in order to better support Steam's markup, while most Markdown syntaxes
        are intended to render to *HTML.*

        While your issue may be a bug, also consider if you should file a feature
        request instead.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: "What did you do that triggered the bug?"
      placeholder: "When I used this input..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: "What did you expect to happen?"
      placeholder: "It should have..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional information
      description: "Anything else to report?"
